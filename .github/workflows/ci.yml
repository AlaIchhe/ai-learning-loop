name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Tests and static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run Ruff
        run: ruff check .

      - name: Run Pyright
        run: pyright .

      - name: Run mypy
        run: mypy socratic_loop/core/ socratic_loop/agents/ socratic_loop/workflow/ --ignore-missing-imports
