# =============================================================================
# Streamlit 主题配置 —— 品牌色系（学术蓝）
# Streamlit 1.58+ 原生支持 [theme.light] / [theme.dark] 双主题
# =============================================================================

[theme]
primaryColor = "#2563eb"
font = "sans serif"
baseFontSize = "15px"
baseFontWeight = "normal"
borderRadius = "8px"

[theme.light]
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#1e293b"
linkColor = "#2563eb"

[theme.dark]
primaryColor = "#3b82f6"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#e2e8f0"
linkColor = "#60a5fa"

[theme.sidebar]
backgroundColor = "#f1f5f9"

[theme.light.sidebar]
backgroundColor = "#f1f5f9"

[theme.dark.sidebar]
backgroundColor = "#1e293b"

# =============================================================================
# 客户端配置
# =============================================================================

[client]
showSidebarNavigation = false

# =============================================================================
# 浏览器配置
# =============================================================================

[browser]
gatherUsageStats = false

# =============================================================================
# 服务器配置
# =============================================================================

[server]
enableXsrfProtection = true
maxUploadSize = 10
